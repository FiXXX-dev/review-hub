name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /review-hub/
          # anon-ключ публичный по дизайну (уходит в браузер), защита — RLS
          VITE_SUPABASE_URL: https://pykqdzitrsluagjrqhhu.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5a3Fkeml0cnNsdWFnanJxaGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MzE3ODUsImV4cCI6MjA5OTQwNzc4NX0.875qMJTAKIAPTMG-wQgw_geUrKqKNNFJYjTAPPMQhqQ
      # SPA-фолбэк: Pages отдаёт 404.html для любых путей вроде /v/demo
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
